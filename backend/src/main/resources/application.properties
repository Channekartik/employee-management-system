# ============================================================
# Employee Management System — Application Configuration
# ============================================================
spring.application.name=employee-management-backend
server.port=8080

# ── MySQL DataSource ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/employee_mgmt_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
# 256-bit Base64 secret key
jwt.secret=bXlTZWN1cmVTZWNyZXRLZXlGb3JKV1RBdXRoU3lzdGVtMTIzNDU2Nzg=
# 24 hours in ms
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.employee=DEBUG
logging.level.org.springframework.security=INFO
